name: SonarCloud Analysis

on:
  workflow_run:
    workflows: ["Coverage"]
    types:
      - completed

jobs:
  sonar:
    name: SonarCloud scan
    if: github.repository == 'fragforce/fragforce.org' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.FRAGFORCE_CI_APP_ID }}
          private-key: ${{ secrets.FRAGFORCE_CI_PRIVATE_KEY }}

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Report test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Django Tests
          path: TEST-*.xml
          reporter: java-junit
          fail-on-error: false
          use-actions-summary: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Set scan properties
        env:
          PR_NUMBER_FILE: pr_number.txt
          PR_BASE_REF_FILE: pr_base_ref.txt
          BRANCH_NAME_FILE: branch_name.txt
        run: |
          echo "SONAR_PR_NUMBER=$(cat "$PR_NUMBER_FILE")" >> "$GITHUB_ENV"
          echo "SONAR_PR_BASE=$(cat "$PR_BASE_REF_FILE")" >> "$GITHUB_ENV"
          echo "SONAR_BRANCH_NAME=$(cat "$BRANCH_NAME_FILE")" >> "$GITHUB_ENV"

      - name: SonarCloud Scan (push)
        if: github.event.workflow_run.event != 'pull_request'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: -Dsonar.branch.name=${{ env.SONAR_BRANCH_NAME }}

      - name: SonarCloud Scan (pull request)
        if: github.event.workflow_run.event == 'pull_request'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: >-
            -Dsonar.pullrequest.key=${{ env.SONAR_PR_NUMBER }}
            -Dsonar.pullrequest.branch=${{ github.event.workflow_run.head_branch }}
            -Dsonar.pullrequest.base=${{ env.SONAR_PR_BASE }}
