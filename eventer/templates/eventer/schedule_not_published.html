{% extends "ff/base.html" %}

{% block title %}Schedule - {{ event.name }}{% endblock %}

{% block body %}
<div class="row mt-4">
  <div class="col-lg-8 offset-lg-2 text-center mt-5">
    <h2>{{ event.name }}</h2>
    <p class="text-muted mt-3">The schedule for this event has not been published yet. Check back soon!</p>
    <a href="{% url 'eventer-event-detail' event_slug=event.slug %}" class="btn btn-outline-secondary mt-2">&larr; Back to event</a>
  </div>
</div>
{% endblock %}
