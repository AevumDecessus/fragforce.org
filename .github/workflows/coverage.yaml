name: Coverage

on:
  push:
    branches:
      - dev
      - master
  pull_request:

jobs:
  coverage:
    name: Run tests with coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_DB: fragforce_test
          POSTGRES_PASSWORD: insecure
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pipenv && pipenv install --dev

      - name: Run tests with coverage
        env:
          DOCKER: "True"
          DATABASE_URL: postgres://postgres:insecure@localhost/fragforce_test
          REDIS_URL: redis://localhost
          SECRET_KEY: insecure-test-key-not-used-in-production
          DJANGO_LOG_LEVEL: WARNING
          TEST_OUTPUT_DIR: test-results
        run: |
          mkdir -p test-results
          pipenv run coverage run manage.py test --testrunner=xmlrunner.extra.djangotestrunner.XMLTestRunner
          pipenv run coverage xml

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Django Tests
          path: test-results/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.number }}" > pr_number.txt
          echo "${{ github.sha }}" > pr_sha.txt

      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            pr_number.txt
            pr_sha.txt
          retention-days: 1
