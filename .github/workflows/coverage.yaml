name: Coverage

on:
  push:
    branches:
      - dev
      - master
  pull_request:

jobs:
  coverage:
    name: Run tests with coverage and SonarCloud scan
    if: github.repository == 'fragforce/fragforce.org'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_DB: fragforce_test
          POSTGRES_PASSWORD: insecure
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pipenv && pipenv install --dev

      - name: Run tests with coverage
        env:
          DOCKER: "True"
          DATABASE_URL: postgres://postgres:insecure@localhost/fragforce_test
          REDIS_URL: redis://localhost
          SECRET_KEY: insecure-test-key-not-used-in-production
          DJANGO_LOG_LEVEL: WARNING
        run: |
          pipenv run coverage run manage.py test
          pipenv run coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
